<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <h1>StreamTracker</h1>
        <div id="auth-area">
            <span id="username-display"></span>
            <button id="logout-btn" class="hidden">Logout</button>
            <button id="register-btn">Register</button>
            <button id="login-btn">Login</button>
        </div>
    </div>
</header>

<nav>
    <div class="tabs-inner">
        <button class="tab active" data-tab="search">Search</button>
        <button class="tab" data-tab="watchlist">Watchlist</button>
        <button class="tab" data-tab="history">History</button>
        <button class="tab" data-tab="ratings">Ratings</button>
    </div>
</nav>

<main>
    <section id="tab-search" class="tab-content">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search movies and TV shows...">
            <button id="search-btn">Search</button>
        </div>
        <div id="search-results" class="media-grid"></div>
    </section>

    <section id="tab-watchlist" class="tab-content hidden">
        <div id="watchlist-content" class="media-list"></div>
    </section>

    <section id="tab-history" class="tab-content hidden">
        <div id="history-content" class="media-list"></div>
    </section>

    <section id="tab-ratings" class="tab-content hidden">
        <div id="ratings-content" class="media-list"></div>
    </section>
</main>

<!-- Login Modal -->
<div id="login-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <p id="login-error" class="error hidden"></p>
        <button id="login-submit">Login</button>
        <button class="modal-close">Cancel</button>
    </div>
</div>

<!-- Register Modal -->
<div id="register-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Register</h2>
        <input type="text" id="reg-username" placeholder="Username">
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-password" placeholder="Password">
        <p id="reg-error" class="error hidden"></p>
        <button id="reg-submit">Register</button>
        <button class="modal-close">Cancel</button>
    </div>
</div>

<!-- Rate Modal -->
<div id="rate-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Rate: <span id="rate-title"></span></h2>
        <div class="star-rating">
            <span class="star" data-value="1">&#9733;</span>
            <span class="star" data-value="2">&#9733;</span>
            <span class="star" data-value="3">&#9733;</span>
            <span class="star" data-value="4">&#9733;</span>
            <span class="star" data-value="5">&#9733;</span>
        </div>
        <textarea id="rate-review" placeholder="Write a review (optional)..."></textarea>
        <p id="rate-error" class="error hidden"></p>
        <button id="rate-submit">Submit</button>
        <button class="modal-close">Cancel</button>
    </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
